<div class="overlay" (click)="onOverlayClick($event)">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h2>Adicionar Lançamentos</h2>
      <button class="close-btn" (click)="close.emit()" aria-label="Fechar">
        <!-- SVG inline: `.close-btn` não é `.btn`, então o `svg` do app-icon
             (encapsulado) não era alcançado pela regra de tamanho e renderizava
             no tamanho intrínseco (24px), destoando dos demais ícones. -->
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M18 6 6 18M6 6l12 12"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <div class="form-section">
        <h3>Dados da Ação</h3>
        <div class="form-row">
          <!-- Ticker com lookup -->
          <div class="form-group ticker-group">
            <label>Ticker *</label>
            <div class="ticker-input-wrap" [class.loading]="fetching()">
              <input
                [(ngModel)]="form.ticker"
                placeholder="ex: VALE3"
                maxlength="7"
                (ngModelChange)="onTickerChange($event)"
                [class.error]="errors.ticker"
                autocomplete="off"
              />
              <span class="ticker-spinner" *ngIf="fetching()">⟳</span>
              <svg
                class="ticker-ok"
                *ngIf="fetchOk() && !fetching()"
                viewBox="0 0 24 24"
                fill="none"
                aria-hidden="true"
              >
                <path
                  d="M20 6 9 17l-5-5"
                  stroke="currentColor"
                  stroke-width="2.4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </div>
            <span class="field-error" *ngIf="errors.ticker">{{ errors.ticker }}</span>
            <span class="fetch-hint" *ngIf="fetchError() && !fetching()"
              >Ticker não encontrado na B3</span
            >
          </div>

          <!-- Nome -->
          <div class="form-group">
            <label
              >Nome da empresa *
              <span class="auto-badge" *ngIf="autoFilled.name">auto</span>
            </label>
            <input
              [(ngModel)]="form.name"
              placeholder="ex: Vale S.A."
              [class.error]="errors.name"
            />
            <span class="field-error" *ngIf="errors.name">{{ errors.name }}</span>
          </div>
        </div>

        <div class="form-row">
          <!-- Setor -->
          <div class="form-group">
            <label
              >Setor *
              <span class="auto-badge" *ngIf="autoFilled.sector">auto</span>
            </label>
            <select [(ngModel)]="form.sector">
              <option value="">Selecione...</option>
              <option *ngFor="let s of sectors" [value]="s">{{ s }}</option>
            </select>
          </div>

          <!-- Preço -->
          <div class="form-group">
            <label
              >Preço atual (R$) *
              <span class="auto-badge" *ngIf="autoFilled.price">auto</span>
            </label>
            <div class="price-wrap">
              <input
                [(ngModel)]="form.price"
                type="number"
                min="0.01"
                step="0.01"
                placeholder="0,00"
                [class.error]="errors.price"
              />
              <span
                class="change-badge"
                *ngIf="changePercent !== null"
                [class.pos]="changePercent >= 0"
                [class.neg]="changePercent < 0"
              >
                {{ changePercent >= 0 ? '+' : '' }}{{ changePercent | number: '1.2-2' }}%
              </span>
            </div>
            <span class="field-error" *ngIf="errors.price">{{ errors.price }}</span>
          </div>

          <!-- DY -->
          <div class="form-group">
            <label>Dividend Yield %</label>
            <input
              [(ngModel)]="form.dividendYield"
              type="number"
              min="0"
              max="100"
              step="0.1"
              placeholder="0,0"
              [class.error]="errors.dy"
            />
            <span class="field-error" *ngIf="errors.dy">{{ errors.dy }}</span>
          </div>
        </div>
      </div>

      <div class="form-error" *ngIf="globalError">{{ globalError }}</div>
    </div>

    <div class="modal-footer">
      <button class="btn btn--ghost" (click)="close.emit()">
        <app-icon name="close"></app-icon>
        Cancelar
      </button>
      <button class="btn btn--primary" (click)="save()" [disabled]="saving() || fetching()">
        <app-icon *ngIf="!saving()" name="plus" [strokeWidth]="2.2"></app-icon>
        {{ saving() ? 'Salvando...' : 'Adicionar' }}
      </button>
    </div>
  </div>
</div>
