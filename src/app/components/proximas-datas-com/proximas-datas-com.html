<div class="pdc-section">
  <h3 class="pdc-title">Próximas datas-com</h3>

  <div class="pdc-loading" *ngIf="loading()">Estimando…</div>

  <ng-container *ngIf="!loading()">
    <p class="pdc-empty" *ngIf="items().length === 0">
      Nenhuma data-com estimada nos próximos 45 dias.
    </p>

    <ul class="pdc-list" *ngIf="items().length > 0">
      <li
        class="pdc-item"
        *ngFor="let it of items()"
        [class.owned]="it.owned"
        [class.urgent]="it.daysUntil <= 7"
      >
        <span class="pdc-bar"></span>
        <span class="pdc-flag" [title]="it.owned ? 'Você já tem' : 'Oportunidade — comprar antes'">
          {{ it.owned ? '🟢' : '🔴' }}
        </span>
        <span class="pdc-ticker">{{ it.ticker }}</span>
        <span class="pdc-date">{{ it.dateLabel }}</span>
        <span class="pdc-cadence">{{ it.cadence }}</span>
        <span class="pdc-tag">{{ it.owned ? 'reforço' : 'oportunidade' }}</span>
        <span class="pdc-days">em {{ it.daysUntil }}d</span>
      </li>
    </ul>

    <p class="pdc-foot" *ngIf="items().length > 0">
      ≈ estimativa pelo histórico · confirme no RI do ativo
    </p>
  </ng-container>
</div>
