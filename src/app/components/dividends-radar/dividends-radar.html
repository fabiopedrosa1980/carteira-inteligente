<div class="radar-section">
  <h3 class="radar-title">Radar de proventos</h3>
  <p class="radar-hint">
    Tickers da carteira com data-com em cada mês no ano anterior — útil para comprar antes da
    próxima data-com.
  </p>

  <div class="radar-loading" *ngIf="loading()">Calculando…</div>

  <div class="radar-grid" *ngIf="!loading()">
    <div
      class="radar-card"
      *ngFor="let m of months()"
      [class.top]="isTop(m)"
      [class.next]="isNext(m)"
    >
      <span class="rc-perf-bar"></span>
      <div class="rc-head">
        <span class="rc-month">{{ m.label }}</span>
        <span class="rc-head-right">
          <span class="rc-tag rc-tag-top" *ngIf="isTop(m)">Melhor mês, aproveite</span>
          <span class="rc-tag rc-tag-next" *ngIf="isNext(m)">
            <svg
              class="rc-warn"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path
                d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"
              />
              <path d="M12 9v4" />
              <path d="M12 17h.01" />
            </svg>
            Oportunidade de compra
          </span>
          <span class="rc-count" *ngIf="m.tickers.length > 0">{{ m.tickers.length }}</span>
        </span>
      </div>
      <div class="rc-tickers" *ngIf="m.tickers.length > 0">
        <span class="ticker-chip" *ngFor="let t of m.tickers">{{ t }}</span>
      </div>
      <span class="rc-empty" *ngIf="m.tickers.length === 0">—</span>
    </div>
  </div>
</div>
