<div class="page-header">
  <div>
    <h2 class="page-title">Dividendos</h2>
  </div>
</div>

<app-scroll-bar class="dv-asset-toggle" role="tablist" [activeKey]="assetType()">
  <button
    *ngFor="let ac of assetClasses"
    class="dv-asset-btn"
    [class.active]="assetType() === ac.id"
    (click)="setAssetType(ac.id)"
  >
    {{ ac.label }}
  </button>
</app-scroll-bar>

<app-scroll-bar class="dv-tabs" [activeKey]="activeTab()">
  <button
    *ngFor="let tab of tabs"
    class="dv-tab"
    [class.active]="activeTab() === tab.id"
    (click)="setTab(tab.id)"
  >
    <svg class="dv-tab-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path
        [attr.d]="tab.iconPath"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
    <span class="dv-tab-label">{{ tab.label }}</span>
  </button>
</app-scroll-bar>

<app-dividend-history
  *ngIf="activeTab() === 'historico'"
  [assetType]="assetType()"
></app-dividend-history>
<app-dividends-summary
  *ngIf="activeTab() === 'recebidos'"
  mode="received"
  [assetType]="assetType()"
></app-dividends-summary>
<app-dividends-summary
  *ngIf="activeTab() === 'projetados'"
  mode="projected"
  [assetType]="assetType()"
></app-dividends-summary>
<app-dividends-radar
  *ngIf="activeTab() === 'radar'"
  [assetType]="assetType()"
></app-dividends-radar>
