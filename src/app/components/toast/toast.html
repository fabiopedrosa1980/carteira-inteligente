<div class="toast" *ngIf="message() as msg" role="status">
  <svg class="toast-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <path
      d="M20 6 9 17l-5-5"
      stroke="currentColor"
      stroke-width="2.4"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </svg>
  <span class="toast-text">{{ msg }}</span>
  <button class="toast-close" (click)="dismiss()" aria-label="Fechar">
    <app-icon name="close"></app-icon>
  </button>
</div>
