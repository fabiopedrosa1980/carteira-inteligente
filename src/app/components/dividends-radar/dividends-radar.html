<div class="radar-section">
  <h3 class="radar-title">Radar de proventos</h3>
  <p class="radar-hint">
    Cada linha é um ativo da carteira; a marca indica o mês em que teve data-com no ano anterior —
    útil para antecipar a próxima.
  </p>

  <div class="radar-loading" *ngIf="loading()">Calculando…</div>

  <ng-container *ngIf="!loading()">
    <p class="radar-empty" *ngIf="rows().length === 0">Nenhum ativo com proventos no período.</p>

    <div class="radar-scroll" *ngIf="rows().length > 0">
      <div class="radar-matrix" role="table">
        <!-- Cabeçalho: canto + meses -->
        <div class="rm-row rm-head" role="row">
          <span class="rm-corner rm-sticky" role="columnheader">Ativo</span>
          <span
            class="rm-month"
            role="columnheader"
            *ngFor="let label of monthLabels; let i = index"
            [class.top]="isTopCol(i)"
            [class.next]="isNextCol(i)"
            [title]="isNextCol(i) ? 'Oportunidade de compra' : isTopCol(i) ? 'Melhor mês' : label"
          >
            <svg
              *ngIf="isNextCol(i)"
              class="rm-warn"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path
                d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"
              />
              <path d="M12 9v4" />
              <path d="M12 17h.01" />
            </svg>
            {{ label }}
          </span>
        </div>

        <!-- Linhas: ticker + células -->
        <div class="rm-row" role="row" *ngFor="let row of rows()">
          <span class="rm-ticker rm-sticky" role="rowheader">{{ row.ticker }}</span>
          <span
            class="rm-cell"
            role="cell"
            *ngFor="let on of row.marks; let i = index"
            [class.on]="on"
            [class.top]="isTopCol(i)"
            [class.next]="isNextCol(i)"
            [title]="row.ticker + ' · ' + monthLabels[i]"
          >
            <span class="rm-dot" *ngIf="on"></span>
          </span>
        </div>
      </div>
    </div>
  </ng-container>
</div>
