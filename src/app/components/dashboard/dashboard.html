<div class="dashboard">
  <header class="dashboard-header">
    <div class="header-left">
      <div
        class="logo"
        role="button"
        tabindex="0"
        title="Voltar para o início"
        aria-label="Carteira Inteligente — voltar para o início"
        (click)="goHome()"
        (keydown.enter)="goHome()"
        (keydown.space)="goHome(); $event.preventDefault()"
      >
        <svg class="logo-mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <rect x="3" y="18" width="6" height="11" rx="1.5" fill="currentColor" opacity="0.45" />
          <rect x="13" y="11" width="6" height="18" rx="1.5" fill="currentColor" opacity="0.7" />
          <rect x="23" y="4" width="6" height="25" rx="1.5" fill="currentColor" />
          <path
            d="M5 15 L16 8 L27 2"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
            opacity="0.5"
          />
        </svg>
        <span class="logo-text">Carteira <strong>Inteligente</strong></span>
      </div>
    </div>
    <div class="header-actions">
      <div class="user-chip" *ngIf="user() as u" [title]="u.email">
        <img
          class="user-avatar"
          *ngIf="u.picture"
          [src]="u.picture"
          [alt]="u.name"
          referrerpolicy="no-referrer"
        />
        <span class="user-avatar fallback" *ngIf="!u.picture">{{ u.name.charAt(0) }}</span>
        <span class="user-name">{{ u.name }}</span>
      </div>
      <button
        class="icon-btn"
        (click)="toggleTheme()"
        [title]="isDark() ? 'Ativar tema claro' : 'Ativar tema escuro'"
        [attr.aria-label]="isDark() ? 'Ativar tema claro' : 'Ativar tema escuro'"
      >
        <svg *ngIf="isDark()" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
          <path
            d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>
        <svg *ngIf="!isDark()" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
      <button class="icon-btn danger" (click)="logout()" title="Sair" aria-label="Sair">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M16 17l5-5-5-5M21 12H9M12 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </div>
  </header>

  <nav class="tab-nav">
    <button
      *ngFor="let tab of tabs"
      [class.active]="activeTab === tab.id"
      (click)="setActiveTab(tab.id)"
    >
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path
          [attr.d]="tab.iconPath"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      <span class="tab-label">{{ tab.label }}</span>
    </button>
  </nav>

  <main class="content">
    <div *ngIf="activeTab === 'meus-ativos'">
      <app-my-assets></app-my-assets>
    </div>

    <div *ngIf="activeTab === 'portfolio'">
      <!-- Lista de ações -->
      <ng-container *ngIf="!selectedStock()">
        <div class="section-header">
          <div>
            <h2 class="page-title">Minhas Ações</h2>
          </div>
          @if (isMobile()) {
            <div class="sort-mobile">
              <span class="sort-label">Ordenar por</span>
              <select
                class="sort-select"
                [value]="sortField()"
                (change)="setSort($any($event.target).value)"
              >
                <option value="default">Padrão</option>
                <option *ngFor="let opt of sortOptions" [value]="opt.field">{{ opt.label }}</option>
              </select>
              <button
                type="button"
                class="sort-dir"
                (click)="toggleSortDir()"
                [disabled]="sortField() === 'default'"
                [title]="sortAsc() ? 'Ascendente' : 'Descendente'"
                [attr.aria-label]="sortAsc() ? 'Ordem ascendente' : 'Ordem descendente'"
              >
                {{ sortAsc() ? '↑' : '↓' }}
              </button>
            </div>
          } @else {
            <app-scroll-bar class="sort-controls" [activeKey]="sortField()">
              <span class="sort-label">Ordenar por</span>
              <button
                *ngFor="let opt of sortOptions"
                [class.active]="sortField() === opt.field"
                (click)="setSort(opt.field)"
              >
                {{ opt.label }}
                <span class="sort-arrow" *ngIf="sortField() === opt.field">
                  {{ sortAsc() ? '↑' : '↓' }}
                </span>
              </button>
            </app-scroll-bar>
          }
        </div>

        <div class="stocks-grid" *ngIf="acoesLoading()" aria-hidden="true">
          <div class="skeleton skeleton-card" *ngFor="let c of skelCards"></div>
        </div>

        <div class="empty-portfolio" *ngIf="!acoesLoading() && acoes().length === 0">
          <svg class="empty-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M22 12h-6l-2 3h-4l-2-3H2M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11Z"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <p>
            Nenhuma ação encontrada. Adicione lançamentos do tipo <strong>Ações</strong> na aba
            Lançamentos.
          </p>
        </div>

        <div class="stocks-grid fade-in" *ngIf="!acoesLoading() && acoes().length > 0">
          <app-stock-card
            *ngFor="let stock of sortedStocks()"
            [stock]="stock"
            (select)="selectedStock.set($event)"
          ></app-stock-card>
        </div>
      </ng-container>

      <!-- Detalhe da ação em tela cheia -->
      <app-stock-details-modal
        *ngIf="selectedStock() as s"
        [stock]="s"
        (close)="selectedStock.set(null)"
      ></app-stock-details-modal>
    </div>

    <div *ngIf="activeTab === 'calendar'">
      <app-dividends *ngIf="acoes().length > 0"></app-dividends>
      <div class="empty-portfolio" *ngIf="acoes().length === 0 && !acoesLoading()">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M22 12h-6l-2 3h-4l-2-3H2M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11Z"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <p>
          Cadastre ativos na aba <strong>Lançamentos</strong> para ver o histórico de dividendos.
        </p>
      </div>
    </div>

    <div *ngIf="activeTab === 'metas'">
      <app-goals [isDark]="isDark()"></app-goals>
    </div>
  </main>
</div>

<app-add-stock-modal *ngIf="showModal" (close)="showModal = false"></app-add-stock-modal>
